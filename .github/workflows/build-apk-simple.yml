name: Build Android APK (React Native 0.73)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          ndk: '25.1.8937393'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Install npm dependencies
        run: npm install

      - name: Build APK
        continue-on-error: false
        run: |
          cd android
          gradle --no-daemon --stacktrace --info clean assembleRelease

      - name: Find APK files
        run: |
          echo "=== APK search results ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== Output directory tree ==="
          find android/app/build/outputs -type d 2>/dev/null | head -20
          echo "=== Files in release folder ==="
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No release folder"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            */app/build/outputs/apk/release/*.apk
          retention-days: 14
