name: Build Android APK (Clean Build Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          ndk: '25.1.8937393'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Debug Environment
        run: |
          echo "=== Java Version ==="
          java -version
          echo "=== Gradle Version ==="
          gradle --version
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=${ANDROID_HOME}"
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not set"
          echo "=== Project Structure ==="
          ls -la
          echo "=== android/ ==="
          ls -la android/
          echo "=== gradle.properties ==="
          test -f android/gradle.properties && cat android/gradle.properties || echo "No gradle.properties"
          echo "=== local.properties ==="
          test -f android/local.properties && cat android/local.properties || echo "No local.properties"

      - name: Install Deps
        run: npm install

      - name: Build APK
        run: |
          cd android
          gradle --no-daemon --stacktrace --info clean assembleRelease

      - name: Show Result
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            echo "✅ SUCCESS! APK built at: $APK"
            echo "📦 Size: $(ls -lh $APK | awk '{print $5}')"
            echo "💡 NOTE: Due to GitHub policy, file download is disabled in this run."
            echo "💡 Please check Actions tab or contact admin for artifact access."
          else
            echo "❌ FAILED: APK not found!"
            echo "🔍 Checking for error logs..."
            ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No output directory"
            find android/app/build -name "*.log" -o -name "*.txt" 2>/dev/null | head -10
            exit 1
          fi
