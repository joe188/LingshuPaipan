name: Build Android APK (Clean Build Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          ndk: '25.1.8937393'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Debug Environment
        run: |
          echo "=== Java Version ==="
          java -version
          echo "=== Gradle Version ==="
          gradle --version
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=${ANDROID_HOME}"
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not set"
          echo "=== Project Structure ==="
          ls -la
          echo "=== android/ ==="
          ls -la android/
          echo "=== gradle.properties ==="
          test -f android/gradle.properties && cat android/gradle.properties || echo "No gradle.properties"
          echo "=== local.properties ==="
          test -f android/local.properties && cat android/local.properties || echo "No local.properties"
          echo "=== npm version ==="
          npm --version
          echo "=== node version ==="
          node --version

      - name: Install Deps
        run: npm install

      - name: Build APK
        id: build_apk
        continue-on-error: true
        run: |
          cd android
          gradle --no-daemon --stacktrace --info clean assembleRelease 2>&1 | tee /tmp/build.log
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
          echo "BUILD_LOG=/tmp/build.log" >> $GITHUB_ENV

      - name: Inspect Output Directory
        if: ${{ env.BUILD_EXIT_CODE == 0 }}
        run: |
          echo "=== Full tree of app/build/outputs ==="
          find android/app/build/outputs -type f 2>/dev/null | sort
          echo "=== Full tree of app/build (filtered) ==="
          find android/app/build -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.log" -o -name "*.json" \) 2>/dev/null | sort
          echo "=== APK files found ==="
          find android/app/build -name "*.apk" -type f 2>/dev/null | wc -l
          echo "=== AAB files found ==="
          find android/app/build -name "*.aab" -type f 2>/dev/null | wc -l
          echo "=== Listing all APK files with details ==="
          find android/app/build -name "*.apk" -type f 2>/dev/null -exec ls -lh {} \;
          echo "=== Listing all AAB files with details ==="
          find android/app/build -name "*.aab" -type f 2>/dev/null -exec ls -lh {} \;
          echo "=== Checking for output-metadata.json ==="
          find android/app/build/outputs -name "output-metadata.json" -type f 2>/dev/null -exec echo "Found: {}" \; -exec cat {} \;

      - name: Capture Build Failure Details
        if: ${{ env.BUILD_EXIT_CODE != 0 }}
        run: |
          echo "=== Build failed with exit code ${{ env.BUILD_EXIT_CODE }} ==="
          echo "=== Last 200 lines of build log ==="
          tail -200 /tmp/build.log || true
          echo "=== Searching for common error patterns ==="
          grep -i "error\|exception\|failed" /tmp/build.log || true
          echo "=== Checking output directories ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No APK output"
          find app/build -name "*.log" -exec echo "Found log: {}" \; -exec tail -10 {} \; 2>/dev/null || true

      - name: Show Result
        run: |
          echo "=== Searching for APK files ==="
          APK=$(find android/app/build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ SUCCESS! APK found at: $APK"
            echo "📦 Size: $(ls -lh $APK | awk '{print $5}')"
            echo "💡 NOTE: Due to GitHub policy, file download is disabled in this run."
            echo "💡 Please check Actions tab or contact admin for artifact access."
            echo "📁 Full listing:"
            find android/app/build -name "*.apk" -type f -exec ls -lh {} \;
          elif [ -n "$(find android/app/build -name "*.aab" -type f 2>/dev/null | head -1)" ]; then
            echo "⚠️  APK not found, but AAB (Android App Bundle) was generated"
            find android/app/build -name "*.aab" -type f -exec ls -lh {} \;
            echo "💡 To generate APK from AAB, use bundletool or change build config"
            exit 1
          else
            echo "❌ FAILED: No APK or AAB file found in any output directory!"
            echo "🔍 Listing all output directories:"
            find android/app/build/outputs -type d 2>/dev/null | head -20
            echo "🔍 Checking if build truly succeeded:"
            test -f android/app/build/outputs/apk/release/output-metadata.json && cat android/app/build/outputs/apk/release/output-metadata.json || echo "No metadata"
            exit 1
          fi
